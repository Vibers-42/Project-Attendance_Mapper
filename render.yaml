services:
  - type: web
    name: am-backend
    runtime: node
    rootDir: backend
    buildCommand: npm ci && npx prisma generate && npx prisma migrate deploy
    startCommand: node server.js
    healthCheckPath: /api/v1/health

    envVars:
      - key: NODE_ENV
        value: production

      # Set these in the Render dashboard — do not hardcode secrets here.
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false

      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 1d

      - key: BCRYPT_SALT_ROUNDS
        value: 10

      # Comma-separated list of allowed CORS origins.
      # Set to your website's Render URL after the first deploy.
      - key: ALLOWED_ORIGINS
        sync: false
